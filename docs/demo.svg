<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes line1 { 0%,5%{opacity:0;transform:translateY(4px)} 8%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line2 { 0%,18%{opacity:0;transform:translateY(4px)} 21%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line3 { 0%,30%{opacity:0;transform:translateY(4px)} 33%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line4 { 0%,42%{opacity:0;transform:translateY(4px)} 45%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line5 { 0%,52%{opacity:0;transform:translateY(4px)} 55%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line6 { 0%,62%{opacity:0;transform:translateY(4px)} 65%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line7 { 0%,72%{opacity:0;transform:translateY(4px)} 75%,100%{opacity:1;transform:translateY(0)} }
      @keyframes line8 { 0%,80%{opacity:0;transform:translateY(4px)} 83%,100%{opacity:1;transform:translateY(0)} }
      @keyframes cursor { 0%,88%{opacity:0} 91%,100%{opacity:1} }
      .l1 { animation: line1 12s ease forwards; }
      .l2 { animation: line2 12s ease forwards; }
      .l3 { animation: line3 12s ease forwards; }
      .l4 { animation: line4 12s ease forwards; }
      .l5 { animation: line5 12s ease forwards; }
      .l6 { animation: line6 12s ease forwards; }
      .l7 { animation: line7 12s ease forwards; }
      .l8 { animation: line8 12s ease forwards; }
      .cursor { animation: cursor 12s step-end forwards; }
      .prompt { fill:#00c66b }
      .output { fill:#888 }
      .cmd { fill:#eee }
      .tag { fill:#00d4ff }
    </style>
  </defs>

  <rect width="680" height="360" rx="8" fill="#1a1a1a"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="32" rx="8" fill="#2d2d2d"/>
  <rect x="0" y="24" width="680" height="8" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="16" r="5" fill="#febc2e"/>
  <circle cx="48" cy="16" r="5" fill="#28c840"/>
  <text x="340" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">todo — bash</text>

  <!-- Line 1: first command -->
  <g class="l1">
    <text x="20" y="60" font-family="monospace" font-size="13" class="prompt">$</text>
    <text x="32" y="60" font-family="monospace" font-size="13" class="cmd">todo -a #work fix the CI pipeline !1 @2026-06-15</text>
  </g>

  <!-- Line 2: output -->
  <g class="l2">
    <text x="20" y="84" font-family="monospace" font-size="13" class="output">Added to [#work]: fix the CI pipeline</text>
  </g>

  <!-- Line 3: second command -->
  <g class="l3">
    <text x="20" y="116" font-family="monospace" font-size="13" class="prompt">$</text>
    <text x="32" y="116" font-family="monospace" font-size="13" class="cmd">todo</text>
  </g>

  <!-- Line 4: tag row -->
  <g class="l4">
    <rect x="16" y="128" width="200" height="20" rx="3" fill="#0d1b2a"/>
    <text x="28" y="143" font-family="monospace" font-size="13" class="tag">▶ 1. #work  (0/3)  ›</text>
  </g>

  <!-- Line 5: tag row -->
  <g class="l5">
    <rect x="16" y="152" width="200" height="20" rx="3" fill="#0d1b2a"/>
    <text x="28" y="167" font-family="monospace" font-size="13" class="tag">▶ 2. #personal  (1/2)  ›</text>
  </g>

  <!-- Line 6: task -->
  <g class="l6">
    <text x="48" y="196" font-family="monospace" font-size="13" fill="#ccc">1. [ ]   buy groceries</text>
  </g>

  <!-- Line 7: done task -->
  <g class="l7">
    <text x="48" y="220" font-family="monospace" font-size="13" fill="#555">2. [x]   call the bank</text>
  </g>

  <!-- Line 8: blinking cursor -->
  <g class="cursor">
    <text x="20" y="252" font-family="monospace" font-size="13" class="prompt">$</text>
    <rect x="32" y="241" width="8" height="14" fill="#fff">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
